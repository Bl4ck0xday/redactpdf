<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedactPDF — Acceso</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;--accent:#e8ff47;--text:#f0f0f5;--muted:#5a5a7a;--danger:#ff4757}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,58,237,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
  .wrap{width:100%;max-width:380px;position:relative;z-index:1}
  .logo{font-size:1.8rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.3rem;display:flex;align-items:center;gap:10px}
  .logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .logo span{color:var(--accent)}
  .tagline{color:var(--muted);font-size:.85rem;margin-bottom:2rem;font-family:'DM Mono',monospace}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(232,255,71,.4),transparent)}
  .field{margin-bottom:1.2rem}
  label{display:block;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
  input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:.9rem;outline:none;transition:border-color .2s}
  input:focus{border-color:var(--accent)}
  input::placeholder{color:var(--muted)}
  .error-box{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.25);color:var(--danger);font-family:'DM Mono',monospace;font-size:.82rem;padding:10px 14px;border-radius:8px;margin-bottom:1.2rem}
  .btn{width:100%;padding:13px;background:var(--accent);color:#0a0a0f;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.02em;margin-top:.5rem}
  .btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(232,255,71,.25)}
  .footer{text-align:center;margin-top:1.5rem;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><div class="logo-icon">📄</div>Redact<span>PDF</span></div>
  <p class="tagline">Conversión segura de documentos</p>
  <div class="card">
    {% if error %}<div class="error-box">⚠ {{ error }}</div>{% endif %}
    <form method="POST" autocomplete="off">
      <div class="field">
        <label>Usuario</label>
        <input type="text" name="username" placeholder="tu usuario" required autofocus autocomplete="off">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn">Entrar</button>
    </form>
  </div>
  <p class="footer">Acceso restringido · Solo usuarios autorizados</p>
</div>
</body>
</html>
